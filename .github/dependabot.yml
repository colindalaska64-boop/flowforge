version: 2
updates:
  # Dépendances npm — scan chaque semaine le lundi matin
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 10
    reviewers:
      - "colindalaska64-boop"
    labels:
      - "security"
      - "dependencies"
    # Grouper minor + patch dans une seule PR pour réduire le bruit
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Ne pas auto-upgrade les majors (breaking changes potentiels)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Actions GitHub CI/CD
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Paris"
    labels:
      - "security"
      - "dependencies"
